# ══════════════════════════════════════════════════════════════════════════════
#  fetch-f2fs-patches.yml
#  Fetch & test F2FS backport patches dari mainline Linux ke AOSP kernel fork
#
#  MODE:
#    commit-based → cari commit spesifik via git log --grep, hasilkan format-patch
#                   ✓ Lebih bersih, hanya perubahan yang relevan
#                   ✓ Disarankan untuk cherry-pick feature tertentu
#
#    diff-full    → diff lengkap per-file antara base_tag dan target_tag
#                   ✓ Sederhana, tidak butuh git history
#                   △ Mengandung semua perubahan (unrelated changes ikut masuk)
#
#  URUTAN APPLY (untuk build.yml nanti):
#    commit-based : git apply / git am  (by nomor: 0001, 0002, ...)
#    diff-full    : patch -p1           (urutan: f2fs_h → checkpoint_c → super_c
#                                                → gc_c → node_c → segment_c → data_c)
#
#  OUTPUT: kernel-patches/ di repo Azure-Kernel-Builder
# ══════════════════════════════════════════════════════════════════════════════

name: 🔧 Fetch F2FS Patches

on:
  workflow_dispatch:
    inputs:

      patch_mode:
        description: 'Mode generasi patch'
        type: choice
        options:
          - commit-based
          - diff-full
        default: commit-based

      commit_keywords:
        description: '[commit-based] Kata kunci cari commit (pisah | untuk OR)'
        type: string
        default: 'checkpoint=merge|CP_OPTION_MERGE|cprc_info|async checkpoint'

      base_tag:
        description: 'Base tag mainline (titik awal diff / batas bawah log)'
        type: string
        default: v5.10

      target_tag:
        description: 'Target tag mainline (titik akhir diff / HEAD pencarian)'
        type: string
        default: v5.14

      kernel_branch:
        description: 'Branch kernel fork untuk dry-run test'
        type: string
        default: android12-5.10

      dry_run:
        description: 'Dry run — generate & test TAPI jangan commit ke repo'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch-patches:
    runs-on: ubuntu-latest

    steps:

      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout Azure-Kernel-Builder (repo ini = tempat patches disimpan)
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout Azure-Kernel-Builder
        uses: actions/checkout@v4
        with:
          repository: whiskiesweet/Azure-Kernel-Builder
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git & workspace
        run: |
          git config user.name  "whiskiesweet"
          git config user.email "noreply@github.com"

          mkdir -p kernel-patches

          # Export ke env supaya bisa diakses step lain
          echo "PATCH_DIR=$GITHUB_WORKSPACE/kernel-patches" >> $GITHUB_ENV
          echo "BASE_TAG=${{ inputs.base_tag }}"            >> $GITHUB_ENV
          echo "TARGET_TAG=${{ inputs.target_tag }}"        >> $GITHUB_ENV
          echo "MODE=${{ inputs.patch_mode }}"              >> $GITHUB_ENV

          echo "════════════════════════════════════════════"
          echo " Mode       : ${{ inputs.patch_mode }}"
          echo " Base tag   : ${{ inputs.base_tag }}"
          echo " Target tag : ${{ inputs.target_tag }}"
          echo " Dry run    : ${{ inputs.dry_run }}"
          echo "════════════════════════════════════════════"


      # ══════════════════════════════════════════════════════════════════════
      #  MODE: commit-based
      #  → Clone mainline dengan shallow-since, cari commits relevan,
      #    generate format-patch per commit
      # ══════════════════════════════════════════════════════════════════════

      - name: "[commit-based] Clone mainline dengan git history (sparse fs/f2fs)"
        if: inputs.patch_mode == 'commit-based'
        run: |
          # --filter=blob:none  → transfer commit + tree objects saja, blob on-demand
          # --shallow-since     → cukup dari ~1 bulan sebelum base_tag
          #   v5.10 rilis 18 Oct 2020, pakai "2020-09-01" sebagai safety margin
          #   Ganti tanggal ini kalau base_tag kamu berbeda:
          #     v5.4  → 2019-10-01
          #     v5.10 → 2020-09-01
          #     v5.15 → 2021-09-01
          echo "Cloning torvalds/linux (sparse: fs/f2fs, shallow-since 2020-09-01)..."

          git clone \
            --filter=blob:none \
            --no-checkout \
            --shallow-since="2020-09-01" \
            https://github.com/torvalds/linux.git \
            /tmp/mainline

          cd /tmp/mainline

          git sparse-checkout init --cone
          git sparse-checkout set fs/f2fs include/linux/f2fs_fs.h

          echo "Fetching tags: ${{ inputs.base_tag }} dan ${{ inputs.target_tag }}..."
          git fetch --update-shallow origin \
            "refs/tags/${{ inputs.base_tag }}:refs/tags/${{ inputs.base_tag }}" \
            "refs/tags/${{ inputs.target_tag }}:refs/tags/${{ inputs.target_tag }}" \
            || {
              echo "⚠ Fetch tags gagal — fallback ke branch HEAD..."
              git fetch --update-shallow origin "${{ inputs.target_tag }}"
            }

          git checkout "${{ inputs.target_tag }}" 2>/dev/null \
            || git checkout "remotes/origin/${{ inputs.target_tag }}" 2>/dev/null \
            || { echo "❌ Tidak bisa checkout ${{ inputs.target_tag }}"; exit 1; }

          echo ""
          echo "✓ Mainline siap:"
          echo "  HEAD   : $(git log --oneline -1)"
          echo "  Base   : $(git log --oneline -1 ${{ inputs.base_tag }} 2>/dev/null || echo 'tidak terdeteksi')"
          echo "  Target : $(git log --oneline -1 ${{ inputs.target_tag }} 2>/dev/null || echo 'lihat HEAD')"

      - name: "[commit-based] Cari & extract commits relevan"
        if: inputs.patch_mode == 'commit-based'
        run: |
          cd /tmp/mainline

          KEYWORDS="${{ inputs.commit_keywords }}"
          echo "═══════════════════════════════════════════════════════════"
          echo " Mencari commits di fs/f2fs/ yang match: '$KEYWORDS'"
          echo " Range: ${{ inputs.base_tag }}..${{ inputs.target_tag }}"
          echo "═══════════════════════════════════════════════════════════"

          # Pisah keywords by | dan cari satu per satu, gabung hasilnya
          ALL_COMMITS=""
          IFS='|' read -ra KW_LIST <<< "$KEYWORDS"
          for KW in "${KW_LIST[@]}"; do
            KW=$(echo "$KW" | xargs)  # trim whitespace
            FOUND=$(git log \
              "${{ inputs.base_tag }}..${{ inputs.target_tag }}" \
              --pretty=format:"%H" \
              --grep="$KW" \
              -- fs/f2fs/ \
              2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              echo "  '$KW' → $(echo "$FOUND" | wc -l) commits"
              ALL_COMMITS="$ALL_COMMITS"$'\n'"$FOUND"
            else
              echo "  '$KW' → tidak ditemukan"
            fi
          done

          # Deduplicate + sort by commit date (oldest first untuk apply order)
          UNIQUE_COMMITS=$(echo "$ALL_COMMITS" \
            | sort -u | grep -v "^$" \
            | xargs -I{} git log --pretty=format:"%ct %H" -1 {} \
            | sort -n | awk '{print $2}')

          TOTAL=$(echo "$UNIQUE_COMMITS" | grep -c "." || echo 0)
          echo ""
          echo "Total commits unik ditemukan: $TOTAL"

          if [ -z "$UNIQUE_COMMITS" ] || [ "$TOTAL" -eq 0 ]; then
            echo ""
            echo "⚠ Tidak ada commit yang match!"
            echo "  Saran:"
            echo "  1. Coba target_tag yang lebih baru: v5.15 atau v5.16"
            echo "  2. Coba commit_keywords yang lebih luas, contoh:"
            echo "     'f2fs: support|f2fs: add checkpoint|f2fs: introduce'"
            echo "  3. Ganti ke patch_mode = diff-full"
            exit 1
          fi

          echo ""
          echo "Commits (urutan oldest → newest = urutan apply):"
          echo "─────────────────────────────────────────────────"
          IDX=0
          for C in $UNIQUE_COMMITS; do
            IDX=$((IDX+1))
            printf "%3d. %s\n" "$IDX" "$(git log --oneline -1 $C)"
          done
          echo "─────────────────────────────────────────────────"

          # Generate format-patch per commit
          mkdir -p /tmp/cp-patches
          IDX=0
          GENERATED=0

          for C in $UNIQUE_COMMITS; do
            IDX=$((IDX+1))
            SUBJECT=$(git log --pretty=format:"%f" -1 "$C" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/--*/-/g' \
              | cut -c1-60)

            PNAME="$(printf '%04d' $IDX)-${SUBJECT}.patch"
            OUT="/tmp/cp-patches/$PNAME"

            git format-patch -1 "$C" \
              --stdout \
              -- fs/f2fs/ include/linux/f2fs_fs.h \
              > "$OUT" 2>/dev/null || true

            if [ -s "$OUT" ]; then
              LINES=$(wc -l < "$OUT")
              echo "✓ $PNAME ($LINES lines)"
              GENERATED=$((GENERATED+1))
            else
              echo "○ $PNAME — kosong (mungkin commit tidak touch f2fs), dihapus"
              rm -f "$OUT"
            fi
          done

          # Hapus patches lama (commit-based) dari workspace, copy yang baru
          rm -f "$PATCH_DIR"/[0-9][0-9][0-9][0-9]-*.patch
          cp /tmp/cp-patches/*.patch "$PATCH_DIR"/ 2>/dev/null || true

          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo " commit-based: $GENERATED patches dihasilkan"
          echo "═══════════════════════════════════════════════════════════"

          if [ "$GENERATED" -eq 0 ]; then
            echo "❌ Tidak ada patch yang dihasilkan! Periksa keywords & tags."
            exit 1
          fi


      # ══════════════════════════════════════════════════════════════════════
      #  MODE: diff-full
      #  → Clone base & target secara terpisah (depth=1),
      #    generate per-file diff untuk file F2FS yang relevan
      # ══════════════════════════════════════════════════════════════════════

      - name: "[diff-full] Clone base @ ${{ inputs.base_tag }}"
        if: inputs.patch_mode == 'diff-full'
        run: |
          echo "Cloning torvalds/linux @ ${{ inputs.base_tag }} (sparse: fs/f2fs)..."
          git clone --filter=blob:none --no-checkout --depth=1 \
            --branch "${{ inputs.base_tag }}" \
            https://github.com/torvalds/linux.git \
            /tmp/base-f2fs

          cd /tmp/base-f2fs
          git sparse-checkout init --cone
          git sparse-checkout set fs/f2fs include/linux/f2fs_fs.h
          git checkout "${{ inputs.base_tag }}"

          echo "✓ Base ready: $(git log --oneline -1)"
          echo "  F2FS files: $(ls fs/f2fs/*.c fs/f2fs/*.h 2>/dev/null | wc -l) files"

      - name: "[diff-full] Clone target @ ${{ inputs.target_tag }}"
        if: inputs.patch_mode == 'diff-full'
        run: |
          echo "Cloning torvalds/linux @ ${{ inputs.target_tag }} (sparse: fs/f2fs)..."
          git clone --filter=blob:none --no-checkout --depth=1 \
            --branch "${{ inputs.target_tag }}" \
            https://github.com/torvalds/linux.git \
            /tmp/target-f2fs

          cd /tmp/target-f2fs
          git sparse-checkout init --cone
          git sparse-checkout set fs/f2fs include/linux/f2fs_fs.h
          git checkout "${{ inputs.target_tag }}"

          echo "✓ Target ready: $(git log --oneline -1)"

          # Verifikasi checkpoint=merge ada di target
          echo ""
          echo "=== Cek keberadaan checkpoint=merge di target ==="
          FOUND=$(grep -rl "CP_OPTION_MERGE\|cprc_info\|checkpoint=merge" \
            fs/f2fs/ 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "✓ checkpoint=merge markers ditemukan di:"
            echo "$FOUND" | sed 's/^/  /'
          else
            echo "⚠ checkpoint=merge TIDAK ditemukan di ${{ inputs.target_tag }}!"
            echo "  → Coba target_tag yang lebih baru: v5.15 atau v5.16"
            echo "  Workflow tetap lanjut, tapi patch mungkin tidak mengandung feature ini."
          fi

      - name: "[diff-full] Generate per-file diff patches"
        if: inputs.patch_mode == 'diff-full'
        run: |
          GENERATED=0
          SKIPPED=0

          # Hapus patches lama (diff-full) dari workspace
          rm -f "$PATCH_DIR"/f2fs-cpmerge-*.patch

          # Urutan penting: f2fs.h (struct) harus dibuat lebih dulu
          # sehingga saat apply di build, struct sudah update sebelum implementasi
          for f in \
            "fs/f2fs/f2fs.h" \
            "fs/f2fs/checkpoint.c" \
            "fs/f2fs/super.c" \
            "fs/f2fs/gc.c" \
            "fs/f2fs/node.c" \
            "fs/f2fs/segment.c" \
            "fs/f2fs/data.c"; do

            BASE="/tmp/base-f2fs/$f"
            TGT="/tmp/target-f2fs/$f"
            EXT=$(echo "$f" | grep -o '\.[ch]$' | tr -d '.')
            BNAME=$(basename "$f" ".$EXT")
            PNAME="f2fs-cpmerge-${BNAME}_${EXT}.patch"
            OUT="$PATCH_DIR/$PNAME"

            if [ ! -f "$BASE" ] || [ ! -f "$TGT" ]; then
              echo "△ Skip $f — tidak ditemukan di salah satu tree"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            diff -u "$BASE" "$TGT" \
              --label "a/$f" \
              --label "b/$f" \
              > "$OUT" || true   # diff returns 1 jika ada perbedaan, itu normal

            if [ -s "$OUT" ]; then
              LINES=$(wc -l  < "$OUT")
              HUNKS=$(grep -c "^@@" "$OUT" 2>/dev/null || echo 0)
              ADDS=$(grep  -c "^+[^+]" "$OUT" 2>/dev/null || echo 0)
              DELS=$(grep  -c "^-[^-]" "$OUT" 2>/dev/null || echo 0)

              if   [ "$LINES" -gt 5000 ]; then FLAG="⚠  BESAR   "
              elif [ "$LINES" -gt 2000 ]; then FLAG="△  medium  "
              else                              FLAG="✓  ok      "; fi

              echo "$FLAG $PNAME"
              echo "         Lines:$LINES | Hunks:$HUNKS | +$ADDS / -$DELS"
              GENERATED=$((GENERATED+1))
            else
              echo "○  $f — identik antara kedua tag, skip"
              rm -f "$OUT"
              SKIPPED=$((SKIPPED+1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo " diff-full: $GENERATED generated, $SKIPPED skipped"
          echo "═══════════════════════════════════════════════════════════"

          if [ "$GENERATED" -eq 0 ]; then
            echo "❌ Tidak ada patch dihasilkan! Semua file identik atau tidak ditemukan."
            exit 1
          fi


      # ────────────────────────────────────────────────────────────────────────
      # Audit patch content (berlaku untuk semua mode)
      # ────────────────────────────────────────────────────────────────────────
      - name: Audit patch content & KMI impact
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " PATCH AUDIT"
          echo "══════════════════════════════════════════════════════════════"

          PATCHES=$(ls "$PATCH_DIR"/*.patch 2>/dev/null | sort)
          if [ -z "$PATCHES" ]; then
            echo "❌ Tidak ada patches di $PATCH_DIR!"
            exit 1
          fi

          TOTAL=$(echo "$PATCHES" | wc -l)
          echo "Total patches : $TOTAL"
          echo "Mode          : ${{ inputs.patch_mode }}"
          echo ""

          KMI_WARN=0

          for p in $PATCHES; do
            NAME=$(basename "$p")
            LINES=$(wc -l < "$p")

            echo "┌─ $NAME ($LINES lines)"

            # Cek checkpoint=merge symbols
            CP_HITS=$(grep -c \
              "CP_OPTION_MERGE\|cprc_info\|f2fs_issue_checkpoint\|cp_task\|checkpoint=merge" \
              "$p" 2>/dev/null || echo 0)
            if [ "$CP_HITS" -gt 0 ]; then
              echo "│  ✓ checkpoint=merge symbols: $CP_HITS occurrences"
            else
              echo "│  △ Tidak ada checkpoint=merge symbols"
            fi

            # Cek EXPORT_SYMBOL (potensi KMI impact)
            EXPORTS=$(grep "^+.*EXPORT_SYMBOL" "$p" 2>/dev/null \
              | grep -v "^+++ " | grep -v "^+.*EXPORT_SYMBOL_UNUSED" || true)
            if [ -n "$EXPORTS" ]; then
              echo "│  ⚠  KMI IMPACT — patch menambah EXPORT_SYMBOL:"
              echo "$EXPORTS" | head -5 | sed 's/^/│    /'
              KMI_WARN=$((KMI_WARN+1))
            fi

            # Info tambahan untuk diff-full: ukuran peringatan
            if [ "${{ inputs.patch_mode }}" = "diff-full" ] && [ "$LINES" -gt 5000 ]; then
              echo "│  ⚠  BESAR ($LINES lines) — diff-full mungkin mengandung banyak"
              echo "│     unrelated changes. Pertimbangkan patch_mode=commit-based."
            fi

            echo "└──"
          done

          echo ""
          if [ "$KMI_WARN" -gt 0 ]; then
            echo "⚠  $KMI_WARN patches berpotensi affect KMI!"
            echo "   → Pastikan KMI_function_symbols_test.py lulus setelah build."
            echo "   → Periksa apakah EXPORT_SYMBOL yang ditambah ada di abi_gki_aarch64.xml"
          else
            echo "✓  Tidak ada KMI risk yang terdeteksi dari patch."
          fi


      # ────────────────────────────────────────────────────────────────────────
      # Clone kernel fork untuk dry-run
      # (FIX dari versi lama: sebelumnya OUR_KERNEL_PATH di-set tapi tidak di-clone)
      # ────────────────────────────────────────────────────────────────────────
      - name: Clone kernel fork untuk dry-run test
        run: |
          echo "Cloning whiskiesweet/android_kernel_common-5.10..."
          echo "Branch: ${{ inputs.kernel_branch }}"

          git clone --depth=1 \
            --branch "${{ inputs.kernel_branch }}" \
            https://github.com/whiskiesweet/android_kernel_common-5.10.git \
            /tmp/our-kernel

          echo ""
          echo "✓ Kernel fork ready:"
          echo "  Commit : $(git -C /tmp/our-kernel log --oneline -1)"
          echo "  F2FS   : $(ls /tmp/our-kernel/fs/f2fs/*.c 2>/dev/null | wc -l) .c files"

          echo ""
          echo "=== Cek apakah checkpoint=merge sudah ada di fork kita ==="
          ALREADY=$(grep -rl "CP_OPTION_MERGE\|cprc_info\|checkpoint=merge" \
            /tmp/our-kernel/fs/f2fs/ 2>/dev/null || true)
          if [ -n "$ALREADY" ]; then
            echo "⚠  checkpoint=merge markers SUDAH ADA di fork:"
            echo "$ALREADY" | sed 's/^/  /'
            echo "  → Patch mungkin tidak perlu diapply!"
            echo "  → Atau sebagian patch akan conflict (already patched)"
          else
            echo "✓ checkpoint=merge belum ada di fork — siap menerima patches"
          fi

          echo "OUR_KERNEL=/tmp/our-kernel" >> $GITHUB_ENV


      # ────────────────────────────────────────────────────────────────────────
      # Dry-run test patches terhadap fork kernel kita
      # ────────────────────────────────────────────────────────────────────────
      - name: Dry-run test patches terhadap kernel fork
        id: dryrun
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " DRY-RUN: Apply ke android_kernel_common-5.10 (simulasi)"
          echo "══════════════════════════════════════════════════════════════"

          PATCHES=$(ls "$PATCH_DIR"/*.patch 2>/dev/null | sort)
          if [ -z "$PATCHES" ]; then
            echo "Tidak ada patches untuk ditest."
            exit 0
          fi

          PASS=0; FUZZY=0; FAIL=0
          FAIL_NAMES=""
          FUZZY_NAMES=""

          for p in $PATCHES; do
            NAME=$(basename "$p")
            echo ""
            echo "─── Testing: $NAME ───"
            > /tmp/dry.log

            # Pilih command test berdasarkan mode
            # commit-based → pakai git apply (format-patch style)
            # diff-full    → pakai patch -p1 (plain diff)
            if [ "${{ inputs.patch_mode }}" = "commit-based" ]; then
              TEST_CMD="git -C $OUR_KERNEL apply --check"
              FUZZ_CMD="git -C $OUR_KERNEL apply --check --3way"
            else
              TEST_CMD="patch -p1 --dry-run -d $OUR_KERNEL"
              FUZZ_CMD="patch -p1 --dry-run --fuzz=3 -d $OUR_KERNEL"
            fi

            if $TEST_CMD < "$p" > /tmp/dry.log 2>&1; then
              echo "  ✓ Applies CLEAN — siap diapply di build"
              PASS=$((PASS+1))

            elif $FUZZ_CMD < "$p" >> /tmp/dry.log 2>&1; then
              echo "  △ Applies dengan fallback (fuzz/3way) — minor offset, masih aman"
              if [ "${{ inputs.patch_mode }}" = "diff-full" ]; then
                grep -E "HUNK|offset|fuzz" /tmp/dry.log | head -5 \
                  | sed 's/^/    /' || true
              fi
              FUZZY=$((FUZZY+1))
              FUZZY_NAMES="$FUZZY_NAMES $NAME"

            else
              echo "  ✗ CONFLICT — tidak bisa diapply otomatis:"
              grep -E "error:|FAILED|can't find|patch does not apply|Hunk #" \
                /tmp/dry.log | head -15 | sed 's/^/    /' || true
              FAIL=$((FAIL+1))
              FAIL_NAMES="$FAIL_NAMES $NAME"
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo " Dry-run Summary:"
          echo "   ✓ Clean    : $PASS  — langsung bisa dipakai"
          echo "   △ Fuzzy    : $FUZZY  — bisa dipakai, minor adjustment"
          echo "   ✗ Conflict : $FAIL  — perlu resolve manual"
          echo "══════════════════════════════════════════════════════════════"

          if [ "$FUZZY" -gt 0 ]; then
            echo ""
            echo "Patches dengan minor offset (△ fuzzy):"
            for N in $FUZZY_NAMES; do echo "  - $N"; done
          fi

          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "Patches yang CONFLICT (✗):"
            for N in $FAIL_NAMES; do echo "  - $N"; done
            echo ""
            echo "═══ Cara resolve conflict tanpa laptop ═══"
            echo ""
            if [ "${{ inputs.patch_mode }}" = "diff-full" ]; then
              echo "  OPSI 1 — Kurangi range diff (LEBIH MUDAH):"
              echo "    → Jalankan ulang dengan target_tag = v5.11 atau v5.12"
              echo "    → Diff lebih kecil = konteks lebih cocok = konflik lebih sedikit"
              echo ""
              echo "  OPSI 2 — Ganti ke commit-based (LEBIH TEPAT SASARAN):"
              echo "    → patch_mode = commit-based"
              echo "    → Hanya commit yang relevan saja yang diambil"
              echo ""
            else
              echo "  OPSI 1 — Perbaiki keywords:"
              echo "    → Coba commit_keywords yang lebih spesifik"
              echo "    → Contoh: 'f2fs: support checkpoint=merge'"
              echo ""
              echo "  OPSI 2 — Edit manual di GitHub:"
              echo "    → Buka file kernel di:"
              echo "       github.com/whiskiesweet/android_kernel_common-5.10/fs/f2fs/"
              echo "    → Bandingkan dengan patch, tambah perubahan manual"
              echo ""
            fi
            echo "  OPSI 3 — Apply partial (HANYA yang clean/fuzzy):"
            echo "    → Di build.yml, skip patch yang FAIL dengan kondisi:"
            echo "       'continue-on-error: true' atau check per nama patch"
          fi

          # Simpan hasil ke env untuk commit message
          echo "DRY_PASS=$PASS"   >> $GITHUB_ENV
          echo "DRY_FUZZY=$FUZZY" >> $GITHUB_ENV
          echo "DRY_FAIL=$FAIL"   >> $GITHUB_ENV

          # Tidak exit 1 agar workflow tetap lanjut ke commit step
          # User bisa review conflict & resolve manual
          exit 0


      # ────────────────────────────────────────────────────────────────────────
      # Final summary sebelum commit
      # ────────────────────────────────────────────────────────────────────────
      - name: Final patch listing
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " FINAL PATCH LIST (yang akan di-commit)"
          echo "══════════════════════════════════════════════════════════════"
          ls -lah "$PATCH_DIR"/*.patch 2>/dev/null || echo "Tidak ada patches!"
          echo ""
          echo "Dry-run  : ✓$DRY_PASS △$DRY_FUZZY ✗$DRY_FAIL"
          echo "Dry run mode: ${{ inputs.dry_run }}"
          echo ""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "ℹ  dry_run=true → patches TIDAK di-commit ke repo"
            echo "   Untuk commit, jalankan ulang dengan dry_run=false"
          else
            echo "→ Melanjutkan ke commit step..."
          fi


      # ────────────────────────────────────────────────────────────────────────
      # Commit patches ke repo (hanya jika dry_run=false)
      # ────────────────────────────────────────────────────────────────────────
      - name: Commit patches ke Azure-Kernel-Builder
        if: ${{ !inputs.dry_run }}
        run: |
          cd "$GITHUB_WORKSPACE"

          PATCH_COUNT=$(ls kernel-patches/*.patch 2>/dev/null | wc -l || echo 0)
          if [ "$PATCH_COUNT" -eq 0 ]; then
            echo "Tidak ada patches baru — skip commit"
            exit 0
          fi

          git add kernel-patches/

          if git diff --cached --quiet; then
            echo "△ Patches identik dengan yang sudah ada di repo — skip commit"
            exit 0
          fi

          # List nama file patches untuk commit message
          PATCH_FILES=$(ls kernel-patches/*.patch 2>/dev/null \
            | xargs -I{} basename {} | tr '\n' ' ')

          git commit -m "kernel-patches: F2FS ${{ inputs.patch_mode }} (${{ inputs.base_tag }} -> ${{ inputs.target_tag }})

          Mode    : ${{ inputs.patch_mode }}
          Base    : ${{ inputs.base_tag }}
          Target  : ${{ inputs.target_tag }}
          Count   : $PATCH_COUNT patches

          Dry-run : ✓$DRY_PASS clean | △$DRY_FUZZY fuzzy | ✗$DRY_FAIL conflict
          Files   : $PATCH_FILES

          Feature : F2FS checkpoint=merge (async checkpoint batching)
          Goal    : reduce /data I/O stutter on gaming workloads

          Apply order di build.yml:
            commit-based → git apply (urut nomor 0001, 0002, ...)
            diff-full    → patch -p1 (urut: f2fs_h → checkpoint_c →
                           super_c → gc_c → node_c → segment_c → data_c)

          CATATAN: Jalankan KMI_function_symbols_test.py setelah build
          karena beberapa f2fs functions di-export via EXPORT_SYMBOL_GPL."

          git push origin main

          echo ""
          echo "✅ Patches berhasil di-push ke Azure-Kernel-Builder/main"
          echo "   Count : $PATCH_COUNT patches"
          echo "   Status: ✓$DRY_PASS clean, △$DRY_FUZZY fuzzy, ✗$DRY_FAIL conflict"
