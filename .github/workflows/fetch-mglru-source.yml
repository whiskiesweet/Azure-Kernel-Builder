# ══════════════════════════════════════════════════════════════════════════════
#  fetch-mglru-source.yml
#  Dump raw MGLRU source files dari Android Common Kernel (android14-5.10)
#  ke folder mglru-source/ di repo Azure-Kernel-Builder
#
#  KENAPA PAKAI android14-5.10, BUKAN linux 6.1:
#    linux 6.1 → MGLRU pakai struct folio (API baru, tidak ada di 5.10)
#    android14-5.10 → Google sudah backport MGLRU khusus untuk kernel 5.10
#                     tanpa folio dependency → LANGSUNG bisa dipakai
#
#  OUTPUT STRUKTUR:
#    mglru-source/
#    ├── README.md             ← Penjelasan setiap file & cara backport
#    ├── mm/
#    │   ├── vmscan.c          ← Inti MGLRU (multi_gen_lru_walk dll)
#    │   └── workingset.c      ← Refault distance + working set tracking
#    ├── include/linux/
#    │   ├── mm_inline.h       ← lru_gen_* inline functions
#    │   └── mmzone.h          ← struct lruvec, struct lru_gen_*
#    ├── mm/Kconfig.mglru      ← Potongan Kconfig untuk LRU_GEN
#    └── diff/
#        └── mglru-full.patch  ← Full diff android12-5.10 → android14-5.10
#                                 (hanya file yang touch MGLRU)
#
#  CARA PAKAI:
#    1. Jalankan workflow ini → cek folder mglru-source/ di repo
#    2. Buka fetch-mglru-patches.yml → generate patches yang siap apply
#    3. Patches di-apply otomatis saat build (lihat build-kernel.yml)
# ══════════════════════════════════════════════════════════════════════════════

name: 📦 Fetch MGLRU Source (android14-5.10)

on:
  workflow_dispatch:
    inputs:

      source_branch:
        description: 'Branch sumber MGLRU (otomatis = coba android14-5.10 → android15-5.10)'
        type: choice
        options:
          - auto-detect
          - android14-5.10
          - android15-5.10
          - android13-5.10
        default: auto-detect

      base_branch:
        description: 'Branch base tanpa MGLRU (untuk generate diff)'
        type: string
        default: android12-5.10

      kernel_branch:
        description: 'Branch fork kernel kita (untuk dry-run test)'
        type: string
        default: android12-5.10

      save_full_files:
        description: 'Simpan file lengkap (bukan hanya diff) ke mglru-source/'
        type: boolean
        default: true

      dry_run:
        description: 'Dry run — generate & audit TAPI jangan commit ke repo'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch-mglru:
    runs-on: ubuntu-latest

    steps:

      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout repo ini (Azure-Kernel-Builder)
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout Azure-Kernel-Builder
        uses: actions/checkout@v4
        with:
          repository: whiskiesweet/Azure-Kernel-Builder
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup workspace & env
        run: |
          git config user.name  "whiskiesweet"
          git config user.email "noreply@github.com"

          mkdir -p mglru-source/mm
          mkdir -p mglru-source/include/linux
          mkdir -p mglru-source/diff

          echo "SRC_DIR=$GITHUB_WORKSPACE/mglru-source" >> $GITHUB_ENV
          echo "BASE_BRANCH=${{ inputs.base_branch }}"  >> $GITHUB_ENV

          echo "════════════════════════════════════════════"
          echo " Source    : ${{ inputs.source_branch }}"
          echo " Base      : ${{ inputs.base_branch }}"
          echo " Dry run   : ${{ inputs.dry_run }}"
          echo "════════════════════════════════════════════"


      # ══════════════════════════════════════════════════════════════════════
      #  Auto-detect: cari branch android common kernel yang sudah punya MGLRU
      #  MGLRU ditandai dengan CONFIG_LRU_GEN di mm/Kconfig
      # ══════════════════════════════════════════════════════════════════════

      - name: Auto-detect branch Android Common Kernel dengan MGLRU
        if: inputs.source_branch == 'auto-detect'
        run: |
          AOSP_BASE="https://android.googlesource.com/kernel/common"
          DETECTED=""

          # Cek branches dari yang paling baru ke lama
          for BRANCH in android15-5.10 android14-5.10 android13-5.10; do
            echo "Checking $BRANCH ..."

            # Clone minimal: hanya mm/Kconfig untuk deteksi MGLRU
            rm -rf /tmp/detect-kernel
            git clone --filter=blob:none --no-checkout --depth=1 \
              --branch "$BRANCH" "$AOSP_BASE" /tmp/detect-kernel 2>/dev/null || {
              echo "  ✗ Branch $BRANCH tidak ada atau gagal clone"
              continue
            }

            cd /tmp/detect-kernel
            git sparse-checkout init --cone
            git sparse-checkout set mm
            git checkout "$BRANCH" 2>/dev/null || {
              echo "  ✗ Gagal checkout $BRANCH"
              cd /
              continue
            }

            if grep -q "LRU_GEN" mm/Kconfig 2>/dev/null; then
              echo "  ✓ $BRANCH → MGLRU DITEMUKAN di mm/Kconfig!"
              DETECTED="$BRANCH"
              cd /
              break
            else
              echo "  ✗ $BRANCH → tidak ada LRU_GEN di mm/Kconfig"
              cd /
            fi
          done

          if [ -z "$DETECTED" ]; then
            echo ""
            echo "❌ Tidak ada branch android*-5.10 yang punya MGLRU di AOSP!"
            echo "   Fallback: akan ambil raw source dari linux mainline v6.1"
            echo "   ⚠  linux 6.1 pakai struct folio — butuh manual adaptation"
            echo "MGLRU_SOURCE_BRANCH=v6.1-fallback" >> $GITHUB_ENV
          else
            echo ""
            echo "✅ Akan gunakan: $DETECTED"
            echo "MGLRU_SOURCE_BRANCH=$DETECTED" >> $GITHUB_ENV
          fi

      - name: Set branch dari input manual
        if: inputs.source_branch != 'auto-detect'
        run: |
          echo "MGLRU_SOURCE_BRANCH=${{ inputs.source_branch }}" >> $GITHUB_ENV


      # ══════════════════════════════════════════════════════════════════════
      #  Clone SUMBER (android14-5.10 atau branch yang terdeteksi)
      #  Sparse: mm/ + include/linux/ saja
      # ══════════════════════════════════════════════════════════════════════

      - name: Clone MGLRU source (android common kernel — sparse mm/ include/)
        if: env.MGLRU_SOURCE_BRANCH != 'v6.1-fallback'
        run: |
          echo "Cloning MGLRU source: $MGLRU_SOURCE_BRANCH ..."
          echo "(sparse: mm/ + include/linux/ — lebih cepat dari full clone)"

          git clone \
            --filter=blob:none \
            --no-checkout \
            --depth=1 \
            --branch "$MGLRU_SOURCE_BRANCH" \
            https://android.googlesource.com/kernel/common \
            /tmp/mglru-src

          cd /tmp/mglru-src
          git sparse-checkout init --cone
          git sparse-checkout set mm include/linux

          git checkout "$MGLRU_SOURCE_BRANCH"

          echo ""
          echo "✓ Source ready:"
          echo "  HEAD   : $(git log --oneline -1)"
          echo "  MGLRU? : $(grep -r 'LRU_GEN\|multi_gen_lru\|lru_gen_' mm/Kconfig mm/vmscan.c 2>/dev/null | wc -l) lines terdeteksi"

          echo "MGLRU_SRC=/tmp/mglru-src" >> $GITHUB_ENV

      # Fallback: linux v6.1 (folio-based, butuh adaptation manual)
      - name: "[Fallback] Clone linux v6.1 (folio-based — perlu adaptasi manual)"
        if: env.MGLRU_SOURCE_BRANCH == 'v6.1-fallback'
        run: |
          echo "⚠  FALLBACK MODE: Clone linux mainline v6.1"
          echo "   File yang dihasilkan menggunakan struct folio"
          echo "   Butuh adaptasi manual sebelum bisa apply ke 5.10"
          echo ""

          git clone \
            --filter=blob:none \
            --no-checkout \
            --depth=1 \
            --branch v6.1 \
            https://github.com/torvalds/linux.git \
            /tmp/mglru-src

          cd /tmp/mglru-src
          git sparse-checkout init --cone
          git sparse-checkout set mm include/linux

          git checkout v6.1

          echo "✓ linux v6.1 ready: $(git log --oneline -1)"
          echo "MGLRU_SRC=/tmp/mglru-src" >> $GITHUB_ENV


      # ══════════════════════════════════════════════════════════════════════
      #  Clone BASE (android12-5.10 — tanpa MGLRU, untuk generate diff)
      # ══════════════════════════════════════════════════════════════════════

      - name: Clone base kernel (android12-5.10 — tanpa MGLRU)
        run: |
          echo "Cloning base: $BASE_BRANCH (android common kernel)..."

          git clone \
            --filter=blob:none \
            --no-checkout \
            --depth=1 \
            --branch "$BASE_BRANCH" \
            https://android.googlesource.com/kernel/common \
            /tmp/mglru-base

          cd /tmp/mglru-base
          git sparse-checkout init --cone
          git sparse-checkout set mm include/linux

          git checkout "$BASE_BRANCH"

          echo ""
          echo "✓ Base ready:"
          echo "  HEAD   : $(git log --oneline -1)"
          echo "  MGLRU? : $(grep -r 'LRU_GEN' mm/Kconfig 2>/dev/null | wc -l) lines (harusnya 0)"

          echo "MGLRU_BASE=/tmp/mglru-base" >> $GITHUB_ENV


      # ══════════════════════════════════════════════════════════════════════
      #  Dump raw MGLRU source files (jika save_full_files = true)
      #
      #  File MGLRU yang disimpan:
      #    PRIMARY (inti implementasi):
      #      mm/vmscan.c           ← lru_gen_*(), multi_gen_lru_walk()
      #      mm/workingset.c       ← lru_gen_refault tracking
      #      include/linux/mmzone.h ← struct lruvec, struct lru_gen_folio
      #      include/linux/mm_inline.h ← lru_gen_add_folio(), helpers
      #
      #    SECONDARY (integrasi & config):
      #      mm/Kconfig            ← CONFIG_LRU_GEN, LRU_GEN_ENABLED, LRU_GEN_STATS
      #      mm/memcontrol.c       ← memcg MGLRU integration
      #      include/linux/mm_types.h ← struct page/folio additions
      #      kernel/sysctl.c       ← /proc/sys/vm/lru_gen_* sysctls
      # ══════════════════════════════════════════════════════════════════════

      - name: Dump raw MGLRU source files ke mglru-source/
        if: inputs.save_full_files == true
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " DUMP RAW MGLRU SOURCE FILES"
          echo " Dari : $MGLRU_SOURCE_BRANCH"
          echo " Ke   : mglru-source/"
          echo "══════════════════════════════════════════════════════════════"

          SAVED=0
          SKIPPED=0

          # ── PRIMARY FILES ──────────────────────────────────────────────
          # File-file ini adalah inti implementasi MGLRU
          echo ""
          echo "[ PRIMARY — Inti Implementasi MGLRU ]"
          echo "────────────────────────────────────────────────────────────"

          for FILE in \
            "mm/vmscan.c" \
            "mm/workingset.c" \
            "include/linux/mmzone.h" \
            "include/linux/mm_inline.h"; do

            SRC="$MGLRU_SRC/$FILE"
            DEST_DIR="$SRC_DIR/$(dirname $FILE)"
            DEST="$SRC_DIR/$FILE"

            if [ ! -f "$SRC" ]; then
              echo "  ✗ Skip $FILE — tidak ditemukan di source"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            mkdir -p "$DEST_DIR"
            cp "$SRC" "$DEST"

            LINES=$(wc -l < "$DEST")
            MGLRU_LINES=$(grep -c \
              "lru_gen\|LRU_GEN\|multi_gen\|lrugen\|MGLRU\|lru_gen_enabled" \
              "$DEST" 2>/dev/null || echo 0)

            echo "  ✓ $FILE"
            echo "    Total: $LINES lines | MGLRU-related: $MGLRU_LINES lines"
            SAVED=$((SAVED+1))
          done

          # ── SECONDARY FILES ────────────────────────────────────────────
          echo ""
          echo "[ SECONDARY — Integrasi & Config ]"
          echo "────────────────────────────────────────────────────────────"

          for FILE in \
            "mm/Kconfig" \
            "mm/memcontrol.c" \
            "include/linux/mm_types.h" \
            "kernel/sysctl.c"; do

            SRC="$MGLRU_SRC/$FILE"
            if [ ! -f "$SRC" ]; then
              echo "  ✗ Skip $FILE — tidak ditemukan"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            mkdir -p "$SRC_DIR/$(dirname $FILE)"
            cp "$SRC" "$SRC_DIR/$FILE"

            LINES=$(wc -l < "$SRC_DIR/$FILE")
            MGLRU_LINES=$(grep -c \
              "lru_gen\|LRU_GEN\|multi_gen" \
              "$SRC_DIR/$FILE" 2>/dev/null || echo 0)

            echo "  ✓ $FILE ($LINES lines, $MGLRU_LINES MGLRU refs)"
            SAVED=$((SAVED+1))
          done

          # ── Kconfig MGLRU section (extract saja bagian LRU_GEN) ────────
          echo ""
          echo "[ Kconfig MGLRU Section Extract ]"
          KCONFIG_SRC="$MGLRU_SRC/mm/Kconfig"
          if [ -f "$KCONFIG_SRC" ]; then
            # Extract section LRU_GEN dari Kconfig
            awk '/^config LRU_GEN/{found=1} found{print} /^config [A-Z]/{if (found && !/^config LRU_GEN/) found=0}' \
              "$KCONFIG_SRC" \
              | head -100 \
              > "$SRC_DIR/mm/Kconfig.mglru-section" 2>/dev/null || true

            KCONFIG_LINES=$(wc -l < "$SRC_DIR/mm/Kconfig.mglru-section" 2>/dev/null || echo 0)
            echo "  ✓ Kconfig LRU_GEN section: $KCONFIG_LINES lines → Kconfig.mglru-section"
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo " Raw source dump: $SAVED file tersimpan, $SKIPPED skip"
          echo "═══════════════════════════════════════════════════════════"


      # ══════════════════════════════════════════════════════════════════════
      #  Generate MGLRU diff patches (base → source)
      #  Ini adalah patches mentah yang bisa dijadikan referensi backport
      # ══════════════════════════════════════════════════════════════════════

      - name: Generate MGLRU diff patches (base → source)
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " GENERATE MGLRU DIFF PATCHES"
          echo " Dari : $BASE_BRANCH (tanpa MGLRU)"
          echo " Ke   : $MGLRU_SOURCE_BRANCH (dengan MGLRU)"
          echo "══════════════════════════════════════════════════════════════"

          DIFF_DIR="$SRC_DIR/diff"
          GENERATED=0
          IDENTICAL=0

          # File yang didiff — urutan penting: header structs dulu
          for FILE in \
            "include/linux/mmzone.h" \
            "include/linux/mm_inline.h" \
            "include/linux/mm_types.h" \
            "mm/Kconfig" \
            "mm/vmscan.c" \
            "mm/workingset.c" \
            "mm/memcontrol.c" \
            "kernel/sysctl.c"; do

            BASE_F="$MGLRU_BASE/$FILE"
            SRC_F="$MGLRU_SRC/$FILE"

            SAFE_NAME=$(echo "$FILE" | tr '/' '_')
            OUT="$DIFF_DIR/${SAFE_NAME}.patch"

            if [ ! -f "$BASE_F" ] || [ ! -f "$SRC_F" ]; then
              echo "  △ Skip $FILE — tidak ditemukan di salah satu tree"
              continue
            fi

            diff -u "$BASE_F" "$SRC_F" \
              --label "a/$FILE" \
              --label "b/$FILE" \
              > "$OUT" || true

            if [ -s "$OUT" ]; then
              LINES=$(wc -l < "$OUT")
              MGLRU_ADDS=$(grep "^+.*lru_gen\|^+.*LRU_GEN\|^+.*multi_gen" \
                "$OUT" 2>/dev/null | wc -l || echo 0)
              echo "  ✓ $FILE → $SAFE_NAME.patch"
              echo "    Diff: $LINES lines | +MGLRU lines: $MGLRU_ADDS"
              GENERATED=$((GENERATED+1))
            else
              echo "  ○ $FILE → identik (tidak ada perubahan)"
              rm -f "$OUT"
              IDENTICAL=$((IDENTICAL+1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo " Diff patches: $GENERATED dihasilkan, $IDENTICAL identik"
          echo "═══════════════════════════════════════════════════════════"

          if [ "$GENERATED" -eq 0 ]; then
            echo ""
            echo "⚠  TIDAK ADA DIFF yang dihasilkan!"
            echo "   Kemungkinan: $MGLRU_SOURCE_BRANCH dan $BASE_BRANCH identik"
            echo "   → Coba source_branch yang berbeda (android15-5.10)"
          fi


      # ══════════════════════════════════════════════════════════════════════
      #  Audit: Cek apakah MGLRU ditemukan di source files
      # ══════════════════════════════════════════════════════════════════════

      - name: Audit MGLRU content & folio dependency check
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " AUDIT MGLRU SOURCE"
          echo "══════════════════════════════════════════════════════════════"

          # ── Check MGLRU symbols di vmscan.c ──────────────────────────
          VMSCAN="$SRC_DIR/mm/vmscan.c"
          if [ -f "$VMSCAN" ]; then
            echo "[ mm/vmscan.c MGLRU symbols ]"
            echo "  lru_gen_*    : $(grep -c 'lru_gen_'   "$VMSCAN" || echo 0) lines"
            echo "  multi_gen_*  : $(grep -c 'multi_gen_' "$VMSCAN" || echo 0) lines"
            echo "  LRU_GEN      : $(grep -c 'LRU_GEN'    "$VMSCAN" || echo 0) lines"
          fi

          # ── Folio dependency check ────────────────────────────────────
          echo ""
          echo "[ FOLIO DEPENDENCY CHECK ]"
          echo "  (struct folio = API baru Linux 5.16+, TIDAK ADA di 5.10)"
          echo ""

          FOLIO_COUNT=0
          for FILE in "$SRC_DIR/mm/vmscan.c" \
                      "$SRC_DIR/mm/workingset.c" \
                      "$SRC_DIR/include/linux/mm_inline.h"; do
            if [ -f "$FILE" ]; then
              FCOUNT=$(grep -c "struct folio\|folio_\|folio->" "$FILE" 2>/dev/null || echo 0)
              NAME=$(basename "$FILE")
              if [ "$FCOUNT" -gt 0 ]; then
                echo "  ⚠  $NAME: $FCOUNT folio references → butuh adaptasi"
                FOLIO_COUNT=$((FOLIO_COUNT + FCOUNT))
              else
                echo "  ✓  $NAME: 0 folio references → langsung compat 5.10"
              fi
            fi
          done

          echo ""
          if [ "$FOLIO_COUNT" -eq 0 ]; then
            echo "✅ TIDAK ADA folio dependency!"
            echo "   Source dari $MGLRU_SOURCE_BRANCH sudah compat dengan 5.10"
            echo "   → Bisa langsung apply ke android12-5.10 (dengan minor adjustment)"
            echo "FOLIO_COMPAT=yes" >> $GITHUB_ENV
          else
            echo "⚠  Total $FOLIO_COUNT folio references ditemukan"
            echo "   Source menggunakan struct folio (API 5.16+)"
            echo "   → Butuh manual adaptation: ganti folio_* ke page_* equivalents"
            echo ""
            echo "   Peta konversi folio → page (untuk 5.10 backport):"
            echo "     folio_lru_list()    → page_lru(page)"
            echo "     folio_gen()         → page->flags >> LRU_GEN_PGOFF"
            echo "     folio_nr_pages()    → hpage_nr_pages(page)"
            echo "     folio_test_lru()    → PageLRU(page)"
            echo "     folio_batch_*()     → pagevec_* equivalents"
            echo "FOLIO_COMPAT=no" >> $GITHUB_ENV
          fi

          # ── Kconfig check ─────────────────────────────────────────────
          echo ""
          echo "[ CONFIG LRU_GEN Kconfig entries ]"
          KCONFIG="$SRC_DIR/mm/Kconfig"
          if [ -f "$KCONFIG" ]; then
            grep -A3 "config LRU_GEN" "$KCONFIG" 2>/dev/null \
              | head -20 | sed 's/^/  /' || echo "  (tidak ditemukan)"
          fi


      # ══════════════════════════════════════════════════════════════════════
      #  Clone fork kernel kita untuk dry-run check
      # ══════════════════════════════════════════════════════════════════════

      - name: Clone kernel fork untuk dry-run patch test
        run: |
          echo "Cloning fork: whiskiesweet/android_kernel_common-5.10 ..."

          git clone --depth=1 \
            --branch "${{ inputs.kernel_branch }}" \
            https://github.com/whiskiesweet/android_kernel_common-5.10.git \
            /tmp/our-kernel

          echo ""
          echo "✓ Fork ready: $(git -C /tmp/our-kernel log --oneline -1)"

          # Cek apakah MGLRU sudah ada di fork kita
          echo ""
          echo "[ Cek status MGLRU di fork kita ]"
          ALREADY=$(grep -r "LRU_GEN\|lru_gen_\|multi_gen_lru" \
            /tmp/our-kernel/mm/vmscan.c 2>/dev/null | wc -l || echo 0)
          KCONFIG_MGLRU=$(grep -c "LRU_GEN" \
            /tmp/our-kernel/mm/Kconfig 2>/dev/null || echo 0)

          if [ "$ALREADY" -gt 10 ]; then
            echo "⚠  MGLRU sudah ada di fork ($ALREADY lines di vmscan.c)!"
            echo "   → Patches mungkin sudah pernah diapply atau partially applied"
          elif [ "$ALREADY" -gt 0 ]; then
            echo "△ Ada $ALREADY MGLRU lines di vmscan.c (partial/stubs)"
            echo "  → Kemungkinan hanya CONFIG stubs, belum implementasi penuh"
          else
            echo "✓ Fork bersih: MGLRU belum ada — siap menerima patches"
          fi

          if [ "$KCONFIG_MGLRU" -gt 0 ]; then
            echo "  Kconfig: LRU_GEN SUDAH ADA ($KCONFIG_MGLRU entries)"
          else
            echo "  Kconfig: LRU_GEN belum ada → akan ditambahkan via patch"
          fi

          echo "OUR_KERNEL=/tmp/our-kernel" >> $GITHUB_ENV

      - name: Dry-run test diff patches ke fork kernel
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " DRY-RUN: Test apply diff patches ke android12-5.10 fork"
          echo "══════════════════════════════════════════════════════════════"

          PATCHES=$(ls "$SRC_DIR/diff"/*.patch 2>/dev/null | sort)
          if [ -z "$PATCHES" ]; then
            echo "△ Tidak ada diff patches untuk ditest (mungkin source == base)"
            exit 0
          fi

          PASS=0; FUZZY=0; FAIL=0

          for p in $PATCHES; do
            NAME=$(basename "$p")
            echo ""
            echo "─── Testing: $NAME ───"

            if patch -p1 --dry-run -d "$OUR_KERNEL" < "$p" > /tmp/dry.log 2>&1; then
              echo "  ✓ Applies CLEAN"
              PASS=$((PASS+1))
            elif patch -p1 --dry-run --fuzz=3 -d "$OUR_KERNEL" < "$p" >> /tmp/dry.log 2>&1; then
              HUNKS=$(grep -c "HUNK\|fuzz\|offset" /tmp/dry.log 2>/dev/null || echo 0)
              echo "  △ Applies dengan fuzz ($HUNKS minor offsets) — masih ok"
              FUZZY=$((FUZZY+1))
            else
              echo "  ✗ CONFLICT:"
              grep -E "FAILED|can't find|patch does not apply|reject" \
                /tmp/dry.log | head -5 | sed 's/^/    /' || true
              FAIL=$((FAIL+1))
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo " Dry-run: ✓$PASS clean | △$FUZZY fuzzy | ✗$FAIL conflict"
          echo "══════════════════════════════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            if [ "$FOLIO_COMPAT" = "no" ]; then
              echo ""
              echo "INFO: Conflict disebabkan folio dependency."
              echo "→ Jalankan fetch-mglru-patches.yml untuk patches yang sudah diadaptasi"
            fi
          fi

          echo "DRYRUN_PASS=$PASS"   >> $GITHUB_ENV
          echo "DRYRUN_FUZZY=$FUZZY" >> $GITHUB_ENV
          echo "DRYRUN_FAIL=$FAIL"   >> $GITHUB_ENV


      # ══════════════════════════════════════════════════════════════════════
      #  Generate README untuk folder mglru-source/
      # ══════════════════════════════════════════════════════════════════════

      - name: Generate README.md untuk mglru-source/
        run: |
          cat > "$SRC_DIR/README.md" << 'READMEEOF'
          # mglru-source/ — Raw MGLRU Source Files

          Folder ini berisi **raw source files** implementasi MGLRU dari Android Common Kernel.
          File-file ini adalah referensi untuk backport ke android12-5.10 GKI.

          ## File Map

          ### PRIMARY (inti implementasi)

          | File | Deskripsi | Symbols Utama |
          |------|-----------|---------------|
          | `mm/vmscan.c` | Inti MGLRU — page reclaim | `lru_gen_shrink_lruvec()`, `multi_gen_lru_walk()` |
          | `mm/workingset.c` | Refault distance tracking | `lru_gen_refault()` |
          | `include/linux/mmzone.h` | Structs: lruvec, lru_gen_* | `struct lru_gen_folio`, `struct lruvec` |
          | `include/linux/mm_inline.h` | Inline helpers | `lru_gen_add_folio()`, `lru_gen_del_folio()` |

          ### SECONDARY (integrasi)

          | File | Deskripsi |
          |------|-----------|
          | `mm/Kconfig` | CONFIG_LRU_GEN, LRU_GEN_ENABLED, LRU_GEN_STATS |
          | `mm/Kconfig.mglru-section` | Extract section LRU_GEN saja |
          | `mm/memcontrol.c` | memcg + MGLRU integration |
          | `include/linux/mm_types.h` | struct page additions |
          | `kernel/sysctl.c` | /proc/sys/vm/lru_gen_enabled |

          ### diff/

          Berisi full diff antara base (tanpa MGLRU) dan source (dengan MGLRU), per-file.
          Gunakan ini sebagai panduan untuk apply perubahan ke fork kamu.

          ## Cara Backport ke android12-5.10

          1. Lihat `diff/mm_vmscan.c.patch` — identifikasi blok kode MGLRU baru
          2. Buka fork kamu di GitHub: `github.com/whiskiesweet/android_kernel_common-5.10/blob/android12-5.10/mm/vmscan.c`
          3. Apply perubahan dari diff secara manual via GitHub editor
          4. Atau jalankan `fetch-mglru-patches.yml` untuk patches yang sudah siap apply

          ## Config yang Dibutuhkan (sudah ada di build.sh kamu)

          ```
          CONFIG_LRU_GEN=y
          CONFIG_LRU_GEN_ENABLED=y
          CONFIG_LRU_GEN_STATS=y
          ```

          READMEEOF

          # Tambah info runtime ke README
          echo "" >> "$SRC_DIR/README.md"
          echo "## Build Info" >> "$SRC_DIR/README.md"
          echo "" >> "$SRC_DIR/README.md"
          echo "- Source branch  : \`$MGLRU_SOURCE_BRANCH\`" >> "$SRC_DIR/README.md"
          echo "- Base branch    : \`$BASE_BRANCH\`"         >> "$SRC_DIR/README.md"
          echo "- Folio compat   : \`$FOLIO_COMPAT\`"        >> "$SRC_DIR/README.md"
          echo "- Dry-run result : ✓$DRYRUN_PASS clean | △$DRYRUN_FUZZY fuzzy | ✗$DRYRUN_FAIL conflict" >> "$SRC_DIR/README.md"
          echo "- Generated      : $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$SRC_DIR/README.md"

          echo ""
          echo "✓ README.md generated"


      # ────────────────────────────────────────────────────────────────────────
      # Final listing
      # ────────────────────────────────────────────────────────────────────────
      - name: Final listing mglru-source/
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo " FINAL: Isi folder mglru-source/"
          echo "══════════════════════════════════════════════════════════════"
          find "$SRC_DIR" -type f | sort | while read f; do
            SIZE=$(stat -c '%s' "$f" | numfmt --to=iec-i 2>/dev/null || wc -c < "$f")
            echo "  $(echo $f | sed "s|$SRC_DIR/||")  ($SIZE bytes)"
          done
          echo ""
          echo "Source   : $MGLRU_SOURCE_BRANCH"
          echo "Folio    : $FOLIO_COMPAT (yes = langsung compat 5.10)"
          echo "Dry-run  : ✓$DRYRUN_PASS △$DRYRUN_FUZZY ✗$DRYRUN_FAIL"
          echo "Dry run mode: ${{ inputs.dry_run }}"


      # ────────────────────────────────────────────────────────────────────────
      # Commit ke repo (hanya jika dry_run=false)
      # ────────────────────────────────────────────────────────────────────────
      - name: Commit mglru-source/ ke Azure-Kernel-Builder
        if: ${{ !inputs.dry_run }}
        run: |
          cd "$GITHUB_WORKSPACE"

          git add mglru-source/

          if git diff --cached --quiet; then
            echo "△ Tidak ada perubahan baru — skip commit"
            exit 0
          fi

          FILE_COUNT=$(find mglru-source/ -type f | wc -l)

          git commit -m "mglru-source: dump raw source dari $MGLRU_SOURCE_BRANCH

          Source   : $MGLRU_SOURCE_BRANCH
          Base     : $BASE_BRANCH
          Files    : $FILE_COUNT files
          Folio    : $FOLIO_COMPAT (yes=compat 5.10 langsung)

          Dry-run  : ✓$DRYRUN_PASS clean | △$DRYRUN_FUZZY fuzzy | ✗$DRYRUN_FAIL conflict

          Isi:
            mm/vmscan.c         ← inti MGLRU implementation
            mm/workingset.c     ← refault distance tracking
            include/linux/mmzone.h    ← struct lruvec, lru_gen_*
            include/linux/mm_inline.h ← lru_gen inline helpers
            mm/Kconfig          ← CONFIG_LRU_GEN entries
            diff/*.patch        ← per-file diff untuk backport guidance

          Next step: jalankan fetch-mglru-patches.yml untuk patches siap-apply"

          git push origin main

          echo ""
          echo "✅ mglru-source/ berhasil di-push ke Azure-Kernel-Builder/main"
          echo "   Files: $FILE_COUNT | Folio compat: $FOLIO_COMPAT"
