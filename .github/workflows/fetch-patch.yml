name: Fetch ZRAM Multi-Comp Patches (mainline v6.1 -> v6.2)

# Workflow ini men-diff drivers/block/zram/ antara tag v6.1 dan v6.2 di
# torvalds/linux (mainline). Karena seluruh seri "zram: support multiple
# compression streams" (Sergey Senozhatsky) masuk tepat di merge window 6.2,
# diff v6.1..v6.2 untuk direktori ini secara praktis HANYA berisi delta
# multi-comp -- jauh lebih kecil & terarah dibanding cherry-pick 13 patch
# satu-satu atau diff 5.10 -> 6.2 langsung.
#
# Hasil: file patch per-file di kernel-patches/, lalu dry-run apply ke
# whiskiesweet/android_kernel_common-5.10 (android12-5.10).
#
# ⚠ Catatan penting:
#   - Ini adalah TITIK AWAL, bukan hasil final. Diff v6.1->v6.2 hampir pasti
#     akan punya conflict/fuzzy hunks saat di-apply ke 5.10, karena
#     zram_drv.c di 5.10 sudah berbeda dari baseline 6.1 (Android-specific
#     changes, writeback, dll). Review & resolve manual masih wajib,
#     terutama untuk zram_drv.c dan zram_drv.h.
#   - Implementasi fungsi inti (zram_recompress(), recompress sysfs handler,
#     worker logic) ADA di diff ini karena diambil langsung dari source
#     mainline -- bukan stub seperti di guide manual.
#   - Setelah apply, WAJIB jalankan KMI_function_symbols_test.py karena
#     struct zram berubah cukup signifikan (comp -> comps[]).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate & test patch tapi JANGAN commit ke repo'
        type: boolean
        default: true
      base_tag:
        description: 'Baseline tag (sebelum multi-comp masuk)'
        type: string
        default: v6.1
      target_tag:
        description: 'Target tag (sesudah multi-comp masuk)'
        type: string
        default: v6.2

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout repo kita (untuk dry-run test & commit target)
      # ---------------------------------------------------------------
      - name: Checkout Azure-Kernel-Builder
        uses: actions/checkout@v4
        with:
          repository: whiskiesweet/Azure-Kernel-Builder
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git & directories
        run: |
          git config user.name  "whiskiesweet"
          git config user.email "noreply@github.com"
          mkdir -p kernel-patches

      # ---------------------------------------------------------------
      # 2. Sparse-clone torvalds/linux pada base_tag (drivers/block/zram saja)
      #    Pakai partial clone + sparse-checkout supaya nggak narik
      #    seluruh repo Linux (~4GB).
      # ---------------------------------------------------------------
      - name: Sparse-clone mainline @ ${{ inputs.base_tag }} (baseline)
        run: |
          echo "Cloning torvalds/linux @ ${{ inputs.base_tag }} (sparse: drivers/block/zram)..."
          git clone --filter=blob:none --no-checkout --depth=1 \
            --branch "${{ inputs.base_tag }}" \
            https://github.com/torvalds/linux.git \
            /tmp/base-zram

          cd /tmp/base-zram
          git sparse-checkout init --cone
          git sparse-checkout set drivers/block/zram
          git checkout "${{ inputs.base_tag }}"

          echo "✓ Baseline: $(git log --oneline -1)"
          ls -la drivers/block/zram/

      # ---------------------------------------------------------------
      # 3. Sparse-clone torvalds/linux pada target_tag
      # ---------------------------------------------------------------
      - name: Sparse-clone mainline @ ${{ inputs.target_tag }} (target)
        run: |
          echo "Cloning torvalds/linux @ ${{ inputs.target_tag }} (sparse: drivers/block/zram)..."
          git clone --filter=blob:none --no-checkout --depth=1 \
            --branch "${{ inputs.target_tag }}" \
            https://github.com/torvalds/linux.git \
            /tmp/target-zram

          cd /tmp/target-zram
          git sparse-checkout init --cone
          git sparse-checkout set drivers/block/zram
          git checkout "${{ inputs.target_tag }}"

          echo "✓ Target: $(git log --oneline -1)"
          ls -la drivers/block/zram/

      # ---------------------------------------------------------------
      # 4. Audit perubahan multi-comp antara dua tag
      # ---------------------------------------------------------------
      - name: Audit multi-comp markers in both trees
        run: |
          echo "══════════════════════════════════════════════════"
          echo " ${{ inputs.base_tag }}: ZRAM_MULTI_COMP markers"
          echo "══════════════════════════════════════════════════"
          grep -rc "MULTI_COMP\|comps\[\|recomp_algorithm\|ZRAM_RECOMP" \
            /tmp/base-zram/drivers/block/zram/*.c /tmp/base-zram/drivers/block/zram/*.h 2>/dev/null \
            || echo "0 matches"

          echo ""
          echo "══════════════════════════════════════════════════"
          echo " ${{ inputs.target_tag }}: ZRAM_MULTI_COMP markers"
          echo "══════════════════════════════════════════════════"
          grep -rc "MULTI_COMP\|comps\[\|recomp_algorithm\|ZRAM_RECOMP" \
            /tmp/target-zram/drivers/block/zram/*.c /tmp/target-zram/drivers/block/zram/*.h 2>/dev/null \
            || echo "0 matches"

      # ---------------------------------------------------------------
      # 5. Generate per-file diff patches
      # ---------------------------------------------------------------
      - name: Generate ZRAM multi-comp diff patches
        run: |
          GENERATED=0
          SKIPPED=0

          for f in \
            "drivers/block/zram/Kconfig" \
            "drivers/block/zram/zcomp.h" \
            "drivers/block/zram/zcomp.c" \
            "drivers/block/zram/zram_drv.h" \
            "drivers/block/zram/zram_drv.c"; do

            BASE="/tmp/base-zram/$f"
            TGT="/tmp/target-zram/$f"
            PNAME="zram-multicomp-$(basename $f).patch"
            OUT="$GITHUB_WORKSPACE/kernel-patches/$PNAME"

            if [ ! -f "$BASE" ] || [ ! -f "$TGT" ]; then
              echo "△ Skip $f — tidak ditemukan di salah satu tree"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            diff -u "$BASE" "$TGT" \
              --label "a/$f" \
              --label "b/$f" \
              > "$OUT" || true

            if [ -s "$OUT" ]; then
              LINES=$(wc -l < "$OUT")
              HUNKS=$(grep -c "^@@" "$OUT" 2>/dev/null || echo 0)
              ADDS=$(grep -c "^+" "$OUT" 2>/dev/null || echo 0)
              DELS=$(grep -c "^-" "$OUT" 2>/dev/null || echo 0)
              echo "✓ $PNAME"
              echo "  Lines: $LINES | Hunks: $HUNKS | +$ADDS / -$DELS"
              GENERATED=$((GENERATED+1))
            else
              echo "○ $f — identical, skip"
              rm -f "$OUT"
              SKIPPED=$((SKIPPED+1))
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════"
          echo " Summary: $GENERATED generated, $SKIPPED skipped"
          echo "══════════════════════════════════════════════════"
          ls -lah $GITHUB_WORKSPACE/kernel-patches/zram-multicomp-*.patch 2>/dev/null \
            || echo "No patches generated"

      # ---------------------------------------------------------------
      # 6. Sanity check ukuran patch
      # ---------------------------------------------------------------
      - name: Sanity check patch sizes
        run: |
          echo "=== Patch size check ==="
          for p in $GITHUB_WORKSPACE/kernel-patches/zram-multicomp-*.patch; do
            [ -f "$p" ] || continue
            LINES=$(wc -l < "$p")
            NAME=$(basename "$p")

            if [ $LINES -gt 3000 ]; then
              echo "⚠  $NAME: $LINES lines — BESAR (kemungkinan zram_drv.c), review manual wajib"
            elif [ $LINES -gt 800 ]; then
              echo "△  $NAME: $LINES lines — cukup besar, review disarankan"
            else
              echo "✓  $NAME: $LINES lines — ok"
            fi
          done

      # ---------------------------------------------------------------
      # 7. Dry-run: test apply ke fork kita
      # ---------------------------------------------------------------
      - name: Dry-run test patches against our kernel fork
        run: |
          echo "=== Dry-run test: apply ke whiskiesweet/android_kernel_common-5.10 ==="

          git clone --depth=1 \
            --branch android12-5.10 \
            https://github.com/whiskiesweet/android_kernel_common-5.10 \
            /tmp/our-kernel

          PASS=0
          FAIL=0
          FUZZY=0

          for p in $GITHUB_WORKSPACE/kernel-patches/zram-multicomp-*.patch; do
            [ -f "$p" ] || continue
            NAME=$(basename "$p")

            echo ""
            echo "--- Testing $NAME ---"

            if patch -p1 --dry-run -d /tmp/our-kernel < "$p" > /tmp/patch-test.log 2>&1; then
              echo "✓ Applies cleanly"
              PASS=$((PASS+1))
            else
              if patch -p1 --dry-run --fuzz=3 -d /tmp/our-kernel < "$p" >> /tmp/patch-test.log 2>&1; then
                echo "△ Applies dengan --fuzz=3 (minor offset)"
                grep -E "HUNK|offset|fuzz" /tmp/patch-test.log | head -10
                FUZZY=$((FUZZY+1))
              else
                echo "✗ CONFLICT DETECTED"
                tail -15 /tmp/patch-test.log
                FAIL=$((FAIL+1))
              fi
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════"
          echo " Dry-run results:"
          echo "   ✓ Clean : $PASS"
          echo "   △ Fuzzy : $FUZZY"
          echo "   ✗ Failed: $FAIL"
          echo "══════════════════════════════════════════════════"

          if [ $FAIL -gt 0 ]; then
            echo ""
            echo "⚠ Ada $FAIL patch yang conflict — ini WAJAR untuk zram_drv.c/h"
            echo "  karena 5.10 punya perbedaan dari baseline mainline v6.1"
            echo "  (Android-specific writeback, dll)."
            echo ""
            echo "  Rekomendasi urutan resolve manual:"
            echo "    1. Kconfig & zcomp.h/zcomp.c — biasanya clean/fuzzy saja"
            echo "    2. zram_drv.h — resolve struct zram & enum zram_pageflags dulu"
            echo "       (cek ZRAM_FLAG_SHIFT supaya ZRAM_RECOMP_PENDING/"
            echo "       ZRAM_INCOMPRESSIBLE tidak bertabrakan dengan bit existing)"
            echo "    3. zram_drv.c paling akhir, per-fungsi (jangan sekaligus)"
          fi

          # Jangan gagalkan workflow karena conflict — biarkan user decide
          exit 0

      # ---------------------------------------------------------------
      # 8. Commit patch ke repo kita (skip jika dry_run=true)
      # ---------------------------------------------------------------
      - name: Checkout Azure-Kernel-Builder (push target)
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v4
        with:
          repository: whiskiesweet/Azure-Kernel-Builder
          ref: main
          path: builder
          token: ${{ secrets.PAT_TOKEN }}

      - name: Commit patches to Azure-Kernel-Builder
        if: ${{ !inputs.dry_run }}
        run: |
          BUILDER="$GITHUB_WORKSPACE/builder"
          cd "$BUILDER"

          git config user.name  "whiskiesweet"
          git config user.email "noreply@github.com"

          mkdir -p kernel-patches

          git rm -f kernel-patches/zram-multicomp-*.patch 2>/dev/null || true

          echo "=== Source patches ==="
          ls "$GITHUB_WORKSPACE/kernel-patches/"zram-multicomp-*.patch

          cp "$GITHUB_WORKSPACE"/kernel-patches/zram-multicomp-*.patch \
            kernel-patches/

          git add kernel-patches/zram-multicomp-*.patch

          if git diff --cached --quiet; then
            echo "△ Tidak ada perubahan — patch sudah terbaru"
          else
            BASE_SHA=$(git -C /tmp/base-zram log --oneline -1)
            TARGET_SHA=$(git -C /tmp/target-zram log --oneline -1)
            PATCH_LIST=$(ls kernel-patches/zram-multicomp-*.patch 2>/dev/null \
              | xargs -I{} basename {} | tr '\n' ' ')

            git commit -m "kernel-patches: add ZRAM multi-comp diff (${{ inputs.base_tag }} -> ${{ inputs.target_tag }})

            Source: github.com/torvalds/linux drivers/block/zram/
            ${{ inputs.base_tag }} : $BASE_SHA
            ${{ inputs.target_tag }} : $TARGET_SHA

            Patches: $PATCH_LIST

            NOTE: butuh resolve manual saat apply ke android12-5.10,
            terutama zram_drv.c/h. Jalankan KMI_function_symbols_test.py
            setelah apply."

            git push origin main
            echo "✓ Pushed ke Azure-Kernel-Builder/main"
          fi
          
